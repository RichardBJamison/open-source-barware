name = "open-source-barware"
compatibility_date = "2024-09-23"
pages_build_output_dir = "out"

# Durable signup safety net — every release-list email is written here before
# we attempt to send the notification mail, so an address is never lost even if
# Forward Email is down. Read back with: wrangler kv key list --binding OSB_SIGNUPS
[[kv_namespaces]]
binding = "OSB_SIGNUPS"
id = "1cc731d2ae40402cb49f4bc104a5cd79"

# First-party visit/download counters for /api/stats and /api/track
[[kv_namespaces]]
binding = "VISITOR_COUNTER"
id = "ea495eafc1904a36b558bcb2117bebe6"