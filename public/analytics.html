<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Analytics — Open Source Barware</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #c97f3a;
    --accent2: #e8a964;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.5;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent2);
  }
  .header .live {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--green);
  }
  .header .live .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls button, .controls select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .controls .refresh-info { font-size: 11px; color: var(--muted); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .metric-card .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .metric-card .value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent2);
  }
  .metric-card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--accent2);
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
  }
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .bar-row .bar-label {
    min-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .bar-row .bar-track {
    flex: 1;
    height: 22px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-row .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    min-width: 2px;
    transition: width 0.5s ease;
  }
  .bar-row .bar-count {
    min-width: 40px;
    text-align: right;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
  }
  /* Hourly chart */
  .hourly-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 120px;
    padding-top: 10px;
  }
  .hourly-bar {
    flex: 1;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .hourly-bar:hover { opacity: 0.8; }
  .hourly-bar .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
  }
  .hourly-bar:hover .tooltip { display: block; }
  .hourly-labels {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .hourly-labels span {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
  }
  /* Daily trend */
  .daily-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .daily-table th {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
  }
  .daily-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .daily-table tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 16px;
  }
  .error {
    text-align: center;
    padding: 40px;
    color: var(--red);
    font-size: 14px;
  }
  .site-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .site-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .site-card h3 {
    font-size: 14px;
    margin-bottom: 2px;
    color: var(--text);
  }
  .site-card .domain {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .site-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .site-metrics div {
    text-align: center;
  }
  .site-metrics .num {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
  }
  .site-metrics .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .site-error {
    font-size: 12px;
    color: var(--red);
    margin-top: 6px;
  }
  .portfolio-total {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Marketing Analytics — Portfolio</h1>
  </div>
  <div class="live" id="live-indicator">
    <div class="dot"></div>
    <span id="live-count">—</span> active now
  </div>
</div>

<div class="controls" id="controls">
  <button data-period="today" class="active">Today</button>
  <button data-period="yesterday">Yesterday</button>
  <button data-period="3d">3 days</button>
  <button data-period="7d">7 days</button>
  <button data-period="30d">30 days</button>
  <button data-period="total">Total</button>
  <button id="refresh-btn" title="Refresh now">&#x21bb; Refresh</button>
  <span class="refresh-info" id="last-refresh">Auto-refreshes every 5 min</span>
</div>

<div id="auth-gate" style="display:none;text-align:center;padding:80px 20px;">
  <h2 style="color:var(--accent2);margin-bottom:16px;">Analytics Dashboard</h2>
  <p style="color:var(--muted);margin-bottom:24px;font-size:14px;">Enter password to continue</p>
  <input type="password" id="auth-input" placeholder="Password" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:6px;font-size:15px;width:240px;text-align:center;" autofocus>
  <br>
  <button id="auth-submit" style="margin-top:12px;background:var(--accent);color:#000;border:none;padding:8px 28px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Unlock</button>
  <p id="auth-error" style="color:var(--red);font-size:13px;margin-top:12px;display:none;">Wrong password</p>
</div>

<div id="content" style="display:none;">
  <div class="loading">Loading analytics...</div>
</div>

<script>
(function() {
  var currentPeriod = 'today';
  var refreshInterval;
  var STORAGE_KEY = 'osb-analytics-key';
  var analyticsKey = localStorage.getItem(STORAGE_KEY) || '';
  var REFRESH_MS = 300000;

  var PERIOD_LABELS = {
    today: 'Today',
    yesterday: 'Yesterday',
    '3d': '3 days',
    '7d': '7 days',
    '30d': '30 days',
    total: 'Total'
  };

  function $(id) { return document.getElementById(id); }

  function authError(message) {
    $('auth-error').textContent = message || 'Wrong password';
    $('auth-error').style.display = 'block';
  }

  // Auth via marketing-stats — no KV reads, so a valid key is not blocked by KV limits.
  function verifyKey(key, onSuccess, onFail) {
    fetch('/api/marketing-stats?period=today&key=' + encodeURIComponent(key)).then(function(r) {
      if (r.status === 401) {
        onFail('Wrong password');
      } else if (r.ok) {
        onSuccess();
      } else {
        return r.json().catch(function() { return {}; }).then(function(body) {
          onFail(body.error || ('Server error (HTTP ' + r.status + ')'));
        });
      }
    }).catch(function() {
      onFail('Network error — try again');
    });
  }

  // Auth gate
  function showGate() {
    $('auth-gate').style.display = 'block';
    $('content').style.display = 'none';
    document.querySelector('.controls').style.display = 'none';
    $('auth-input').focus();
  }

  function unlock(key) {
    analyticsKey = key;
    localStorage.setItem(STORAGE_KEY, key);
    $('auth-gate').style.display = 'none';
    $('content').style.display = 'block';
    document.querySelector('.controls').style.display = 'flex';
    load();
    if (!refreshInterval) {
      refreshInterval = setInterval(load, REFRESH_MS);
    }
  }

  $('auth-submit').addEventListener('click', function() {
    var val = $('auth-input').value.trim();
    if (!val) return;
    $('auth-error').style.display = 'none';
    verifyKey(val, function() {
      unlock(val);
    }, function(msg) {
      authError(msg);
      if (msg === 'Wrong password') {
        $('auth-input').value = '';
        $('auth-input').focus();
      }
    });
  });

  $('auth-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') $('auth-submit').click();
  });

  // If we have a stored key, try it silently
  if (analyticsKey) {
    verifyKey(analyticsKey, function() {
      unlock(analyticsKey);
    }, function() {
      localStorage.removeItem(STORAGE_KEY);
      analyticsKey = '';
      showGate();
    });
  } else {
    showGate();
  }

  // Controls
  document.querySelectorAll('[data-period]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-period]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      load();
    });
  });
  $('refresh-btn').addEventListener('click', load);

  function fetchDashboardPart(url) {
    return fetch(url).then(function(r) {
      return r.json().then(function(body) {
        return { ok: r.ok, status: r.status, body: body };
      });
    });
  }

  function mergeOsbView(ga4, fp) {
    var fpOverview = (fp && fp.overview) ? fp.overview : {};
    var fpDegraded = !!(fp && fp.degraded);
    var ga4Ok = ga4 && !ga4.error;

    if (!ga4Ok && !fp) {
      return {
        source: 'none',
        degraded: true,
        warning: (ga4 && ga4.error) ? ga4.error : 'No OSB analytics available.',
        overview: {},
        dailyTrend: [],
        hourlyDistribution: new Array(24).fill(0),
        topPages: [],
        topReferrers: [],
        topRefUrls: [],
        topCountries: [],
        topCities: [],
        browsers: [],
        operatingSystems: [],
        devices: [],
        topScreens: [],
        languages: [],
        topDownloads: [],
        utm: { sources: [], mediums: [], campaigns: [] }
      };
    }

    var dailyTrend = [];
    if (ga4Ok && ga4.dailyTrend && ga4.dailyTrend.length) {
      var dlByDate = {};
      (fp.dailyTrend || []).forEach(function(d) { dlByDate[d.date] = d.downloads || 0; });
      dailyTrend = ga4.dailyTrend.map(function(d) {
        return {
          date: d.date,
          views: d.views || 0,
          unique: d.unique || 0,
          downloads: dlByDate[d.date] || 0
        };
      });
    } else {
      dailyTrend = fp.dailyTrend || [];
    }

    var overview = {
      liveNow: ga4Ok ? (ga4.activeNow || 0) : (fpOverview.liveNow || 0),
      totalAllTime: ga4Ok ? (ga4.pageViews || 0) : (fpOverview.totalAllTime || 0),
      uniqueVisitorsEver: ga4Ok ? (ga4.activeUsers || 0) : (fpOverview.uniqueVisitorsEver || 0),
      todayUniqueVisitors: fpOverview.todayUniqueVisitors || 0,
      todayVisitTotal: fpOverview.todayVisitTotal || 0,
      weekUniqueVisitors: fpOverview.weekUniqueVisitors || 0,
      weekVisitTotal: fpOverview.weekVisitTotal || 0,
      totalDownloadsAllTime: fpOverview.totalDownloadsAllTime || 0,
      todayDownloads: fpOverview.todayDownloads || 0,
      todayUniqueDownloaders: fpOverview.todayUniqueDownloaders || 0,
      weekDownloads: fpOverview.weekDownloads || 0,
      weekUniqueDownloaders: fpOverview.weekUniqueDownloaders || 0,
      totalPageviews: ga4Ok ? (ga4.pageViews || 0) : (fpOverview.totalPageviews || 0),
      uniqueVisitors: ga4Ok ? (ga4.activeUsers || 0) : (fpOverview.uniqueVisitors || 0),
      periodDownloads: fpOverview.periodDownloads || 0,
      periodUniqueDownloaders: fpOverview.periodUniqueDownloaders || 0,
      humanVisits: fpOverview.humanVisits || 0,
      botVisits: fpOverview.botVisits || 0,
      newVisitors: ga4Ok ? (ga4.newUsers || 0) : (fpOverview.newVisitors || 0),
      returningVisitors: ga4Ok
        ? Math.max(0, (ga4.activeUsers || 0) - (ga4.newUsers || 0))
        : (fpOverview.returningVisitors || 0),
      avgLoadTime: fpOverview.avgLoadTime || 0,
      sessions: ga4Ok ? (ga4.sessions || 0) : 0,
      engagementRate: ga4Ok ? (ga4.engagementRate || 0) : 0,
      avgSessionSeconds: ga4Ok ? (ga4.avgSessionSeconds || 0) : 0
    };

    return {
      source: ga4Ok ? 'ga4+downloads' : 'first-party',
      degraded: fpDegraded && !ga4Ok,
      fpDegraded: fpDegraded,
      warning: fp.warning || '',
      ga4Error: ga4 && ga4.error ? ga4.error : '',
      overview: overview,
      dailyTrend: dailyTrend,
      hourlyDistribution: ga4Ok
        ? (ga4.hourlyDistribution || new Array(24).fill(0))
        : (fp.hourlyDistribution || new Array(24).fill(0)),
      topPages: ga4Ok ? (ga4.topPages || []) : (fp.topPages || []),
      topReferrers: ga4Ok ? (ga4.topReferrers || []) : (fp.topReferrers || []),
      topRefUrls: fp.topRefUrls || [],
      topCountries: ga4Ok ? (ga4.topCountries || []) : (fp.topCountries || []),
      topCities: ga4Ok ? (ga4.topCities || []) : (fp.topCities || []),
      browsers: ga4Ok ? (ga4.browsers || []) : (fp.browsers || []),
      operatingSystems: ga4Ok ? (ga4.operatingSystems || []) : (fp.operatingSystems || []),
      devices: ga4Ok ? (ga4.devices || []) : (fp.devices || []),
      topScreens: fp.topScreens || [],
      languages: fp.languages || [],
      topDownloads: fp.topDownloads || [],
      utm: fp.utm || { sources: [], mediums: [], campaigns: [] }
    };
  }

  function emptyOsbStats() {
    return {
      generated: new Date().toISOString(),
      degraded: true,
      warning: 'First-party OSB stats are temporarily unavailable.',
      overview: {
        liveNow: 0,
        totalAllTime: 0,
        uniqueVisitorsEver: 0,
        todayUniqueVisitors: 0,
        todayVisitTotal: 0,
        weekUniqueVisitors: 0,
        weekVisitTotal: 0,
        totalDownloadsAllTime: 0,
        todayDownloads: 0,
        todayUniqueDownloaders: 0,
        weekDownloads: 0,
        weekUniqueDownloaders: 0,
        totalPageviews: 0,
        uniqueVisitors: 0,
        periodDownloads: 0,
        periodUniqueDownloaders: 0,
        humanVisits: 0,
        botVisits: 0,
        newVisitors: 0,
        returningVisitors: 0,
        avgLoadTime: 0
      },
      dailyTrend: [],
      hourlyDistribution: new Array(24).fill(0),
      topPages: [],
      topReferrers: [],
      topRefUrls: [],
      topCountries: [],
      topCities: [],
      browsers: [],
      operatingSystems: [],
      devices: [],
      topScreens: [],
      languages: [],
      topDownloads: [],
      utm: { sources: [], campaigns: [] }
    };
  }

  function load() {
    $('last-refresh').textContent = 'Loading...';
    var keyParam = analyticsKey ? '&key=' + encodeURIComponent(analyticsKey) : '';
    Promise.all([
      fetchDashboardPart('/api/marketing-stats?period=' + currentPeriod + keyParam),
      fetchDashboardPart('/api/stats?period=' + currentPeriod + keyParam)
    ])
      .then(function(results) {
        var marketingResult = results[0];
        var statsResult = results[1];

        if (marketingResult.status === 401 || statsResult.status === 401) {
          localStorage.removeItem(STORAGE_KEY);
          analyticsKey = '';
          if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
          }
          showGate();
          authError('Session expired — enter password again');
          return;
        }

        if (!marketingResult.ok) {
          throw new Error('marketing HTTP ' + marketingResult.status);
        }

        var marketing = marketingResult.body;
        var stats = statsResult.ok
          ? statsResult.body
          : emptyOsbStats();

        if (!statsResult.ok) {
          stats.warning = (statsResult.body && statsResult.body.error)
            ? statsResult.body.error
            : ('OSB stats HTTP ' + statsResult.status);
        }

        var osb = mergeOsbView(marketing.osbGa4Detail, stats);
        render(marketing, osb);
      })
      .catch(function(err) {
        var msg = err.message || 'unknown error';
        $('content').innerHTML = '<div class="error">Failed to load analytics: ' + esc(msg) + '</div>';
        $('last-refresh').textContent = 'Error — click refresh to retry';
      });
  }

  function renderMarketing(marketing) {
    var t = marketing.totals;
    var periodLabel = (marketing.period && marketing.period.label)
      ? marketing.period.label
      : (PERIOD_LABELS[currentPeriod] || currentPeriod);
    var html = '';

    html += '<div class="section">';
    html += '<h2>Marketing Portfolio — ' + periodLabel + '</h2>';
    html += '<div class="portfolio-total">';
    html += metricCard('Portfolio Users', fmt(t.activeUsers), fmt(t.newUsers) + ' new');
    html += metricCard('Portfolio Sessions', fmt(t.sessions), fmt(t.pageViews) + ' pageviews');
    html += metricCard('Portfolio Events', fmt(t.events), fmt(t.activeNow) + ' active now');
    html += '</div>';

    html += '<div class="site-grid">';
    marketing.sites.forEach(function(site) {
      html += '<div class="site-card">';
      html += '<h3><a href="' + esc(site.url) + '" target="_blank" rel="noopener">' + esc(site.name) + '</a></h3>';
      html += '<div class="domain">' + esc(site.domain) + '</div>';
      if (site.error) {
        html += '<div class="site-error">' + esc(site.error) + '</div>';
      } else {
        html += '<div class="site-metrics">';
        html += '<div><div class="num">' + fmt(site.activeUsers) + '</div><div class="lbl">Users</div></div>';
        html += '<div><div class="num">' + fmt(site.sessions) + '</div><div class="lbl">Sessions</div></div>';
        html += '<div><div class="num">' + fmt(site.pageViews) + '</div><div class="lbl">Views</div></div>';
        html += '</div>';
        html += '<div class="sub" style="font-size:11px;color:var(--muted)">' + fmt(site.activeNow) + ' active now · ' + fmt(site.events) + ' events</div>';
        if (site.topChannels && site.topChannels.length) {
          html += '<div style="margin-top:8px;font-size:11px;color:var(--muted)">Top channel: ' + esc(site.topChannels[0].channel) + ' (' + fmt(site.topChannels[0].sessions) + ')</div>';
        }
      }
      html += '</div>';
    });
    html += '</div></div>';

    return html;
  }

  function render(marketing, data) {
    var o = data.overview;
    var periodLabel = (marketing.period && marketing.period.label)
      ? marketing.period.label
      : (PERIOD_LABELS[currentPeriod] || currentPeriod);
    var ga4Live = (marketing.osbGa4Detail && !marketing.osbGa4Detail.error)
      ? (marketing.osbGa4Detail.activeNow || 0)
      : (o.liveNow || 0);
    $('live-count').textContent = (marketing.totals.activeNow || 0) + ' portfolio / ' + ga4Live + ' OSB';
    $('last-refresh').textContent = 'Updated ' + new Date(marketing.generated).toLocaleTimeString();

    var html = renderMarketing(marketing);

    if (data.ga4Error) {
      html += '<div class="section" style="border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.08)">';
      html += '<h2 style="color:#f87171">GA4 Unavailable for OSB Detail</h2>';
      html += '<p style="color:var(--muted);font-size:14px;line-height:1.6">' + esc(data.ga4Error) + '</p>';
      html += '</div>';
    }

    if (data.fpDegraded) {
      html += '<div class="section" style="border-color:rgba(234,179,8,0.35);background:rgba(234,179,8,0.08)">';
      html += '<h2 style="color:#fbbf24">Download Counters Paused</h2>';
      html += '<p style="color:var(--muted);font-size:14px;line-height:1.6">' + esc(data.warning || 'First-party download tracking temporarily unavailable.') + '</p>';
      html += '<p style="color:var(--muted);font-size:13px;margin-top:8px">Traffic metrics below come from Google Analytics. Download counts resume after the daily KV reset (midnight UTC).</p>';
      html += '</div>';
    }

    var sourceTag = data.source === 'ga4+downloads'
      ? '<span class="tag tag-blue">GA4 traffic</span> <span class="tag tag-green">First-party downloads</span>'
      : '<span class="tag tag-green">First-party</span>';

    html += '<div class="section"><h2>Open Source Barware — GA4 + Downloads</h2>';
    html += '<p style="color:var(--muted);font-size:13px;margin-bottom:14px">' + sourceTag + ' · ' + periodLabel + '</p>';

    // Headline counters — GA4 traffic + first-party downloads
    html += '<div class="section">';
    html += '<h2>Traffic &amp; Downloads</h2>';
    html += '<div class="grid">';
    html += metricCard('Period Pageviews', fmt(o.totalPageviews), 'GA4 · ' + periodLabel);
    html += metricCard('Period Users', fmt(o.uniqueVisitors), fmt(o.newVisitors || 0) + ' new · GA4');
    html += metricCard('Period Sessions', fmt(o.sessions || 0), o.avgSessionSeconds ? Math.round(o.avgSessionSeconds) + 's avg' : 'GA4');
    html += metricCard('Active Now', fmt(ga4Live), 'GA4 realtime');
    html += metricCard('All-Time Downloads', fmt(o.totalDownloadsAllTime || 0), 'First-party counter');
    html += metricCard('Today Downloads', fmt(o.todayDownloads || 0), fmt(o.todayUniqueDownloaders || 0) + ' unique today');
    html += metricCard('Week Downloads', fmt(o.weekDownloads || 0), fmt(o.weekUniqueDownloaders || 0) + ' unique this week');
    html += metricCard('Period Downloads', fmt(o.periodDownloads || 0), fmt(o.periodUniqueDownloaders || 0) + ' unique in period');
    html += '</div></div>';

    // Period detail
    html += '<div class="grid">';
    html += metricCard('Returning Users', fmt(o.returningVisitors), 'GA4 estimate');
    html += metricCard('Engagement Rate', o.engagementRate ? (Math.round(o.engagementRate * 100) + '%') : '—', 'GA4');
    html += metricCard('Human Visits (FP)', fmt(o.humanVisits), fmt(o.botVisits) + ' bots · first-party');
    html += metricCard('Avg Load Time (FP)', o.avgLoadTime ? (o.avgLoadTime + 'ms') : '—', 'First-party only');
    html += '</div>';

    // Hourly distribution
    html += '<div class="section">';
    html += '<h2>Hourly Distribution (UTC)</h2>';
    var maxH = Math.max.apply(null, data.hourlyDistribution) || 1;
    html += '<div class="hourly-chart">';
    for (var h = 0; h < 24; h++) {
      var val = data.hourlyDistribution[h];
      var pctH = (val / maxH * 100);
      html += '<div class="hourly-bar" style="height:' + Math.max(pctH, 1.5) + '%"><div class="tooltip">' + h + ':00 UTC — ' + val + ' views</div></div>';
    }
    html += '</div>';
    html += '<div class="hourly-labels">';
    for (var h = 0; h < 24; h++) {
      html += '<span>' + (h % 3 === 0 ? h : '') + '</span>';
    }
    html += '</div></div>';

    // Daily trend table
    if (data.dailyTrend.length > 1) {
      html += '<div class="section">';
      html += '<h2>Daily Breakdown</h2>';
      html += '<table class="daily-table"><thead><tr><th>Date</th><th>Pageviews</th><th>Unique</th><th>Downloads</th><th>Views/Visitor</th></tr></thead><tbody>';
      data.dailyTrend.slice().reverse().forEach(function(d) {
        var vpv = d.unique > 0 ? (d.views / d.unique).toFixed(1) : '—';
        html += '<tr><td>' + d.date + '</td><td>' + fmt(d.views) + '</td><td>' + fmt(d.unique) + '</td><td>' + fmt(d.downloads || 0) + '</td><td>' + vpv + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // Two-column sections
    html += '<div class="two-col">';

    // Top pages
    html += '<div class="section"><h2>Top Pages</h2>';
    html += barChart(data.topPages, o.totalPageviews);
    html += '</div>';

    // Referrers
    html += '<div class="section"><h2>Traffic Sources</h2>';
    if (data.topReferrers.length === 0) {
      html += '<p style="color:var(--muted);font-size:13px">No external referrers yet</p>';
    } else {
      html += barChart(data.topReferrers, o.totalPageviews);
    }
    html += '</div>';

    html += '</div>'; // end two-col

    // Geo + Devices
    html += '<div class="two-col">';

    // Countries
    html += '<div class="section"><h2>Countries</h2>';
    html += barChart(data.topCountries, o.totalPageviews);
    html += '</div>';

    // Cities
    html += '<div class="section"><h2>Cities</h2>';
    html += barChart(data.topCities, o.totalPageviews);
    html += '</div>';

    html += '</div>';

    // Browser/OS/Device
    html += '<div class="two-col">';

    html += '<div class="section"><h2>Browsers</h2>';
    html += barChart(data.browsers, o.totalPageviews);
    html += '</div>';

    html += '<div class="section"><h2>Operating Systems</h2>';
    html += barChart(data.operatingSystems, o.totalPageviews);
    html += '</div>';

    html += '</div>';

    html += '<div class="two-col">';

    html += '<div class="section"><h2>Devices</h2>';
    html += barChart(data.devices, o.totalPageviews);
    html += '</div>';

    html += '<div class="section"><h2>Screen Sizes</h2>';
    html += barChart(data.topScreens, o.totalPageviews);
    html += '</div>';

    html += '</div>';

    // UTM campaigns
    if (data.utm.sources.length > 0 || data.utm.campaigns.length > 0) {
      html += '<div class="section"><h2>UTM Campaigns</h2>';
      html += '<div class="two-col">';
      html += '<div><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">Sources</h3>' + barChart(data.utm.sources, campaignVisits(data)) + '</div>';
      html += '<div><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">Campaigns</h3>' + barChart(data.utm.campaigns, campaignVisits(data)) + '</div>';
      html += '</div></div>';
    }

    // Downloads + Languages
    html += '<div class="two-col">';
    html += '<div class="section"><h2>Top Downloads</h2>';
    if (!data.topDownloads || data.topDownloads.length === 0) {
      html += '<p style="color:var(--muted);font-size:13px">No downloads tracked yet</p>';
    } else {
      html += barChart(data.topDownloads, o.periodDownloads || 1);
    }
    html += '</div>';

    html += '<div class="section"><h2>Languages</h2>';
    html += barChart(data.languages, o.totalPageviews);
    html += '</div>';

    html += '</div>';

    html += '<div class="two-col">';

    // Referrer URLs
    html += '<div class="section"><h2>Top Referrer URLs</h2>';
    if (data.topRefUrls.length === 0) {
      html += '<p style="color:var(--muted);font-size:13px">No external referrer URLs yet</p>';
    } else {
      html += barChart(data.topRefUrls.map(function(r) {
        return { name: truncate(r.name, 60), count: r.count };
      }), o.totalPageviews);
    }
    html += '</div>';

    html += '</div></div>';

    $('content').innerHTML = html;
  }

  function metricCard(label, value, sub) {
    return '<div class="metric-card"><div class="label">' + label + '</div><div class="value">' + value + '</div><div class="sub">' + (sub || '') + '</div></div>';
  }

  function barChart(items, total) {
    if (!items || items.length === 0) return '<p style="color:var(--muted);font-size:13px">No data</p>';
    var maxCount = items[0].count || 1;
    var html = '<div class="bar-chart">';
    items.forEach(function(item) {
      var w = (item.count / maxCount * 100);
      html += '<div class="bar-row">';
      html += '<span class="bar-label" title="' + esc(item.name) + '">' + esc(item.name) + '</span>';
      html += '<span class="bar-track"><span class="bar-fill" style="width:' + w + '%"></span></span>';
      html += '<span class="bar-count">' + fmt(item.count) + '</span>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function fmt(n) {
    return (n || 0).toLocaleString();
  }

  function pct(a, b) {
    if (!b) return '0%';
    return Math.round(a / b * 100) + '%';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function truncate(s, n) {
    return s.length > n ? s.slice(0, n) + '...' : s;
  }

  function campaignVisits(data) {
    var t = 0;
    data.utm.sources.forEach(function(s) { t += s.count; });
    return t || 1;
  }

})();
</script>
</body>
</html>
