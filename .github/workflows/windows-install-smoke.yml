# Synthetic Windows client — no physical PC required locally.
# Builds the customer zip, installs like a user, runs internal VC checklist.

name: Windows install smoke

on:
  push:
    paths:
      - "program/**"
      - "scripts/package-program.mjs"
      - ".github/workflows/windows-install-smoke.yml"
  pull_request:
    paths:
      - "program/**"
      - "scripts/package-program.mjs"
  workflow_dispatch:

jobs:
  windows-install:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build customer Windows zip
        run: npm ci && npm run package:program

      - name: Extract zip (customer path)
        shell: pwsh
        run: |
          $zip = "public/downloads/open-source-barware-program-win.zip"
          $dest = "$env:RUNNER_TEMP\osb-customer"
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Get-ChildItem -Recurse $dest | Select-Object -First 20 FullName

      - name: Allow loopback port (GHA Windows firewall)
        shell: pwsh
        run: netsh advfirewall firewall add rule name="OSB-CI-5052" dir=in action=allow protocol=TCP localport=5052

      - name: Run installer from extracted package (silent)
        shell: pwsh
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP "osb-customer\open-source-barware-program"
          if (-not (Test-Path $pkg)) { throw "extracted package missing at $pkg" }
          Set-Location $pkg
          ./install.ps1 -Silent -SkipBrowser
          if ($LASTEXITCODE -ne 0) {
            $logDir = Join-Path $env:USERPROFILE "osb-program\data"
            Get-ChildItem $logDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "--- $($_.FullName) ---"; Get-Content $_.FullName }
            exit $LASTEXITCODE
          }

      - name: Run internal VC checklist
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE "osb-program"
          pwsh -NoProfile -ExecutionPolicy Bypass -File "$installDir\scripts\windows-vc.ps1" -InstallDir $installDir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stop server
        shell: pwsh
        if: always()
        run: |
          Get-NetTCPConnection -LocalPort 5052 -ErrorAction SilentlyContinue |
            ForEach-Object { if ($_.OwningProcess) { Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue } }