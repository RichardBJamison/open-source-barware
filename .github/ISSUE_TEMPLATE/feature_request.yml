name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Tell us what problem you are trying to solve — that
        helps us more than a specific solution.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that is hard or impossible today?
      placeholder: As a bar manager, I need to ... but currently ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: contribute
    attributes:
      label: Would you be willing to help build this?
      options:
        - label: I'd be willing to work on this or help test it
          required: false
