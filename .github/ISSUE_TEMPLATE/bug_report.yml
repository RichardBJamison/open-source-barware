name: Bug Report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you give, the
        faster we can fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I clicked X, Y happened instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Where did this happen?
      options:
        - Website (opensourcebarware.com)
        - The Dojo / inventory sandbox
        - Downloaded program
        - Spreadsheet / prompt templates
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 126 on macOS 14
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or extra context
    validations:
      required: false
